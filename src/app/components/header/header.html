<header>
  <mat-toolbar color="primary" class="custom-toolbar">
    <div class="logo-section">
      <span class="app-title">Nahuel Alderete</span>
    </div>

    <span class="spacer"></span>

    <nav class="nav-links">
      <a mat-button (click)="scrollTo('home')" [class.active-link]="activeSection() === 'home'" i18n>
        <mat-icon>home</mat-icon>
        Home
      </a>
      <a mat-button (click)="scrollTo('about-me')" [class.active-link]="activeSection() === 'about-me'" i18n>
        <mat-icon>person_raised_hand</mat-icon>
        Sobre mí
      </a>
      <a mat-button (click)="scrollTo('resume')" [class.active-link]="activeSection() === 'resume'" i18n>
        <mat-icon>article_person</mat-icon>
        Mi Curriculum
      </a>
      <a mat-button (click)="scrollTo('contact-me')" [class.active-link]="activeSection() === 'contact-me'" i18n>
        <mat-icon>mail</mat-icon>
        Contacto
      </a>

      <a mat-button (click)="switchLocale()">
        <mat-icon>translate</mat-icon>
        {{ currentLocale === 'es-AR' ? 'EN' : 'ES' }}
      </a>
    </nav>

    <button class="btn-menu-mobile" mat-icon-button (click)="toggleMobileMenu()"
      [attr.aria-expanded]="isMobileMenuOpen()">
      <mat-icon>{{ isMobileMenuOpen() ? 'close' : 'menu' }}</mat-icon>
    </button>
  </mat-toolbar>

  <nav class="mobile-menu" [class.show]="isMobileMenuOpen()">
    <div class="mobile-menu-content">
      <a mat-button (click)="scrollTo('home'); closeMobileMenu()" [class.active-link]="activeSection() === 'home'" i18n>
        <mat-icon>home</mat-icon>
        Home
      </a>
      <a mat-button (click)="scrollTo('about-me'); closeMobileMenu()" [class.active-link]="activeSection() === 'about-me'" i18n>
        <mat-icon>person_raised_hand</mat-icon>
        Sobre mí
      </a>
      <a mat-button (click)="scrollTo('resume'); closeMobileMenu()" [class.active-link]="activeSection() === 'resume'" i18n>
        <mat-icon>article_person</mat-icon>
        Mi Curriculum
      </a>
      <a mat-button (click)="scrollTo('contact-me'); closeMobileMenu()" [class.active-link]="activeSection() === 'contact-me'" i18n>
        <mat-icon>mail</mat-icon>
        Contact
      </a>

      <a mat-button (click)="switchLocale()">
        <mat-icon>translate</mat-icon>
        {{ currentLocale === 'es-AR' ? 'English' : 'Español' }}
      </a>
    </div>
  </nav>

  <div class="mobile-menu-overlay" (click)="closeMobileMenu()" [class.show]="isMobileMenuOpen()"></div>
</header>
